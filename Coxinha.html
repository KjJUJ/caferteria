<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cafeteria da Mamãe</title>

<style>
body{
font-family:Arial;
padding:40px;
text-align:center;
}

.card{
max-width:300px;
margin:auto;
padding:20px;
border:1px solid #ddd;
border-radius:15px;
}

button{
padding:10px 18px;
margin:8px;
font-size:20px;
cursor:pointer;
}

.whatsapp{
background:#25D366;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}
</style>
</head>

<body>

<div class="card">
<h2>Coxinha</h2>
<p>R$ 2,50</p>

<button onclick="diminuir()">-</button>
<span id="quantidade">1</span>
<button onclick="aumentar()">+</button>

<br><br>

<button class="whatsapp" onclick="pedirWhatsapp()">
Pedir pelo WhatsApp
</button>
</div>

<script>
let quantidade = 1;

function aumentar(){
quantidade++;
document.getElementById("quantidade").innerText = quantidade;
}

function diminuir(){
if(quantidade > 1){
quantidade--;
document.getElementById("quantidade").innerText = quantidade;
}
}

function pedirWhatsapp(){
let numero = "5541998844105"; // troque pelo número
let mensagem = `Olá! Quero pedir ${quantidade} coxinha(s)`;
let link = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

window.open(link, "_blank");
}
</script>

</body>
</html>
